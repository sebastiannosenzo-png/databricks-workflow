# Site
title: Databricks Workflow
description: >-
  A reusable, company-agnostic prompt library for building a secure, in-house
  Databricks system that helps staff produce data analyses and research faster
  and at higher quality — built step by step with Genie Code, Databricks'
  native coding agent.
theme: just-the-docs

# Build
markdown: kramdown
permalink: pretty

# just-the-docs settings
color_scheme: olive
search_enabled: true
search:
  heading_level: 3
  previews: 3
heading_anchors: true

# Footer / repo links (edit org/repo after first push)
aux_links:
  GitHub: https://github.com/sebastiannosenzo-png/databricks-workflow
back_to_top: true
back_to_top_text: "Back to top"

# Callouts
callouts:
  warning:
    title: Risk / Verify
    color: red
  note:
    title: Note
    color: grey-dk
  principle:
    title: Design principle
    color: green

# Exclude scaffolding from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - README-dev.md
