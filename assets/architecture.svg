<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 1000" font-family="Helvetica, Arial, sans-serif">
  <title>End-to-end system architecture on Databricks</title>
  <desc>A user works in the Databricks App, which drives a Mosaic AI agent powered by Databricks-served models. The agent calls tools that read a Unity Catalog governed data foundation, and results flow back up to the app.</desc>

  <defs>
    <marker id="arDown" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L8 4 L0 8 Z" fill="#6B654B"/></marker>
    <marker id="arUp" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L8 4 L0 8 Z" fill="#30321C"/></marker>
    <marker id="arEg" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L8 4 L0 8 Z" fill="#4A4B2F"/></marker>
  </defs>

  <rect x="0" y="0" width="1340" height="1000" fill="#FFFFFF"/>

  <!-- Perimeter -->
  <rect x="40" y="118" width="1120" height="762" rx="18" fill="none" stroke="#6B654B" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="60" y="146" font-size="15" fill="#30321C" font-weight="700">Databricks Security Perimeter (AWS)</text>

  <!-- User -->
  <rect x="525" y="34" width="150" height="48" rx="9" fill="#6B654B" stroke="#4A4B2F" stroke-width="1.4"/>
  <text x="600" y="64" text-anchor="middle" font-size="16" font-weight="700" fill="#D4DF9E">User</text>

  <!-- User <-> App -->
  <line x1="585" y1="82" x2="585" y2="166" stroke="#6B654B" stroke-width="2.4" marker-end="url(#arDown)"/>
  <line x1="615" y1="168" x2="615" y2="80" stroke="#30321C" stroke-width="2.4" marker-end="url(#arUp)"/>

  <!-- App -->
  <rect x="110" y="168" width="980" height="58" rx="10" fill="#4A4B2F" stroke="#4A4B2F" stroke-width="1.4"/>
  <text x="600" y="192" text-anchor="middle" font-size="17" font-weight="700" fill="#D4DF9E">Databricks App</text>
  <text x="600" y="212" text-anchor="middle" font-size="12.5" fill="#D4DF9E" fill-opacity="0.85">One Interface: Input &#183; Plan Approval &#183; Editing &#183; Results</text>

  <!-- App <-> Reasoning -->
  <line x1="585" y1="226" x2="585" y2="260" stroke="#6B654B" stroke-width="2.4" marker-end="url(#arDown)"/>
  <line x1="615" y1="262" x2="615" y2="224" stroke="#30321C" stroke-width="2.4" marker-end="url(#arUp)"/>
  <text x="648" y="248" font-size="12" fill="#30321C" font-style="italic">Results To App</text>

  <!-- Reasoning region -->
  <rect x="110" y="262" width="980" height="156" rx="12" fill="none" stroke="#6B654B" stroke-width="1.5"/>
  <text x="600" y="290" text-anchor="middle" font-size="17" font-weight="700" fill="#30321C">Mosaic AI Agent</text>
  <text x="600" y="310" text-anchor="middle" font-size="12.5" fill="#4A4B2F">Plans &#183; Calls Tools &#183; Synthesizes</text>
  <text x="600" y="337" text-anchor="middle" font-size="12" fill="#4A4B2F" font-style="italic">Served and governed through Databricks</text>

  <!-- Model chips -->
  <rect x="170" y="350" width="260" height="50" rx="9" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="300" y="380" text-anchor="middle" font-size="15" font-weight="700" fill="#30321C">Claude</text>
  <rect x="470" y="350" width="260" height="50" rx="9" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="600" y="380" text-anchor="middle" font-size="15" font-weight="700" fill="#30321C">GPT OSS</text>
  <rect x="770" y="350" width="260" height="50" rx="9" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="900" y="380" text-anchor="middle" font-size="15" font-weight="700" fill="#30321C">Gemini</text>

  <!-- Reasoning <-> Tools -->
  <line x1="585" y1="418" x2="585" y2="456" stroke="#6B654B" stroke-width="2.4" marker-end="url(#arDown)"/>
  <line x1="615" y1="458" x2="615" y2="416" stroke="#30321C" stroke-width="2.4" marker-end="url(#arUp)"/>

  <!-- Tools -->
  <rect x="80" y="458" width="184" height="74" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="172" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Vector Search</text>
  <text x="172" y="510" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Internal &amp; Project Docs</text>

  <rect x="294" y="458" width="184" height="74" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="386" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Genie</text>
  <text x="386" y="510" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Natural Language &#8594; SQL</text>

  <rect x="508" y="458" width="184" height="74" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="600" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Analysis &amp; ML</text>
  <text x="600" y="510" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Regressions, AutoML, Sandbox</text>

  <rect x="722" y="458" width="184" height="74" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="814" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Chart Engine</text>
  <text x="814" y="510" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Styled Visualizations</text>

  <rect x="936" y="458" width="184" height="74" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="1028" y="490" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Web Research AI</text>
  <text x="1028" y="510" text-anchor="middle" font-size="11.5" fill="#4A4B2F">External Web Research</text>

  <!-- External web -->
  <rect x="1186" y="476" width="128" height="56" rx="9" fill="#6B654B" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="1250" y="500" text-anchor="middle" font-size="14" font-weight="700" fill="#D4DF9E">External Web</text>
  <text x="1250" y="518" text-anchor="middle" font-size="11" fill="#D4DF9E" fill-opacity="0.85">Any Site</text>
  <line x1="1120" y1="504" x2="1184" y2="504" stroke="#4A4B2F" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arEg)"/>
  <text x="1250" y="466" text-anchor="middle" font-size="11" fill="#4A4B2F">Secured by Web Research AI</text>

  <!-- Tools <-> Data -->
  <line x1="585" y1="532" x2="585" y2="570" stroke="#6B654B" stroke-width="2.4" marker-end="url(#arDown)"/>
  <line x1="615" y1="572" x2="615" y2="530" stroke="#30321C" stroke-width="2.4" marker-end="url(#arUp)"/>

  <!-- Data foundation -->
  <rect x="110" y="572" width="980" height="286" rx="12" fill="none" stroke="#6B654B" stroke-width="1.5"/>
  <text x="130" y="598" font-size="15" fill="#30321C" font-weight="700">Unity Catalog Governance</text>

  <!-- Row 1 -->
  <rect x="130" y="618" width="290" height="96" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="275" y="658" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Lakeflow Ingestion</text>
  <text x="275" y="680" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Scheduled Dataset Pulls</text>

  <rect x="455" y="618" width="290" height="96" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="600" y="658" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Medallion Delta Tables</text>
  <text x="600" y="680" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Bronze &#183; Silver &#183; Gold</text>

  <rect x="780" y="618" width="290" height="96" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="925" y="658" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Vector Index</text>
  <text x="925" y="680" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Document &amp; Project Embeddings</text>

  <!-- Row 2 -->
  <rect x="130" y="738" width="290" height="96" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="275" y="778" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Document Store &amp; Registry</text>
  <text x="275" y="800" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Volumes &#183; Project Folders &#183; Usage Log</text>

  <rect x="455" y="738" width="290" height="96" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="600" y="778" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">MLflow + Model Registry</text>
  <text x="600" y="800" text-anchor="middle" font-size="11.5" fill="#4A4B2F">Analysis Lineage &#183; Models</text>

  <rect x="780" y="738" width="290" height="96" rx="10" fill="#D4DF9E" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="925" y="778" text-anchor="middle" font-size="16" font-weight="700" fill="#30321C">Style Rules + Edit Logs</text>
  <text x="925" y="800" text-anchor="middle" font-size="11.5" fill="#4A4B2F">House Style &#183; Learning Loop</text>

  <!-- Dataset API external + ingest arrow -->
  <rect x="40" y="908" width="170" height="46" rx="9" fill="#6B654B" stroke="#4A4B2F" stroke-width="1.3"/>
  <text x="125" y="930" text-anchor="middle" font-size="13.5" font-weight="700" fill="#D4DF9E">Dataset API</text>
  <text x="125" y="946" text-anchor="middle" font-size="10.5" fill="#D4DF9E" fill-opacity="0.85">APIs</text>
  <path d="M120 908 L120 666 L128 666" fill="none" stroke="#4A4B2F" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arEg)"/>
  <text x="214" y="898" font-size="11" fill="#4A4B2F">Scheduled Pull</text>

  <!-- Legend -->
  <rect x="392" y="958" width="22" height="10" rx="2" fill="#6B654B"/>
  <text x="422" y="967" font-size="12.5" fill="#30321C">Request (Down)</text>
  <rect x="560" y="958" width="22" height="10" rx="2" fill="#30321C"/>
  <text x="590" y="967" font-size="12.5" fill="#30321C">Results (Up)</text>
  <line x1="700" y1="963" x2="732" y2="963" stroke="#4A4B2F" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="740" y="967" font-size="12.5" fill="#30321C">External Access</text>
</svg>
